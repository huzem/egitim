<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUZEM | Eğitim Kaynakları Portalı</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f1f5f9;
margin:0;
}

header{
background:#7a0026;
padding:40px;
text-align:center;
color:white;
}

header img{
width:160px;
background:white;
padding:10px;
border-radius:10px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.search-box{
width:100%;
padding:16px;
border-radius:10px;
border:none;
margin-bottom:30px;
font-size:16px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.course-card{
background:white;
margin-bottom:15px;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.course-header{
padding:18px;
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}

.status-icon{
font-size:20px;
color:#c9a24d;
}

.course-content{
max-height:0;
overflow:hidden;
transition:0.4s;
background:#fafafa;
}

.content-body{
padding:10px 20px 20px;
}

.week-row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.week-number{
font-weight:800;
color:#c9a24d;
font-size:13px;
}

.button-group{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.btn{
padding:7px 14px;
border-radius:6px;
font-size:12px;
text-decoration:none;
font-weight:600;
}

.btn-primary{
background:#7a0026;
color:white;
}

.btn-outline{
border:1px solid #ddd;
color:#333;
}

footer{
margin-top:40px;
padding:30px;
text-align:center;
background:#e2e8f0;
}

</style>
</head>

<body>

<header>

<img src="https://hitit.edu.tr/images/HititLogoYeni.svg">

<h2>Eğitim Kaynakları Portalı</h2>

<p>Uzaktan Eğitim Uygulama ve Araştırma Merkezi</p>

</header>


<div class="container">

<input type="text" id="searchInput" class="search-box" placeholder="Ders adı yazın..." onkeyup="filterCourses()">

<div id="course-container"></div>

</div>


<footer>

<b>© 2026 Hitit Üniversitesi</b>

</footer>



<script>

const courses=[

},
{
week:"03",
sunum:"https://www.canva.com/design/DAHCVFFy_2k/O5C0XA9qeAkx1vNX3q_Saw/view"

]
},

  /* ======================

{

},
{
week:"02",
sunum:"https://www.canva.com/design/DAHBkw9RJAo/ZEaurW0JCbunUzyYDmTmiQ/view",
video:"https://1drv.ms/v/c/22cb6c37a95edd3f/IQDe_Bvv1IIoQqha97QYrd6kASVU9rWk_Lf_UJZt3kC_OJg?e=R0KvHb"
},
{
week:"03",
sunum:"https://www.canva.com/design/DAHBkw9RJAo/ZEaurW0JCbunUzyYDmTmiQ/view",
video:"https://1drv.ms/v/c/22cb6c37a95edd3f/IQDe_Bvv1IIoQqha97QYrd6kASVU9rWk_Lf_UJZt3kC_OJg?e=R0KvHb"
}
]
},

/* ======================

====================== */
  
  
{
title:"Eğitim Psikolojisi",
weeks:[
{
week:"01",
video:"https://1drv.ms/v/c/22cb6c37a95edd3f/IQA7TMCJVkfuRIPXcinBRzL_AfWU7TW8yf16ThxYpaqwLIQ?e=Mzm3wf"
}
]
},

  
/* ======================

====================== */
  
{
title:"Türk Eğitim Sistemi ve Okul Yönetimi",
weeks:[

}
]
},

  /* ======================
   ÖĞRETİM İLKE VE YÖNTEMLERİ
====================== */
  
{
title:"Öğretim İlke ve Yöntemleri",
weeks:[
{
week:"01",
video:"https://1drv.ms/v/c/22cb6c37a95edd3f/IQASMen-MuWjSY9o6cRnvt6ZAanURx9ALlUXRlyHxFTVVsg?e=SsQMyS"
}
]
}

]

function createCourses(){

const container=document.getElementById("course-container")

courses.forEach(course=>{

let weeksHTML=""

course.weeks.forEach(w=>{

weeksHTML+=`

<div class="week-row">

<div class="week-number">${w.week}. HAFTA</div>

<div class="button-group">

${w.sunum ? `<a class="btn btn-primary" href="${w.sunum}" target="_blank">📊 Sunum</a>` : ""}

${w.video ? `<a class="btn btn-outline" href="${w.video}" target="_blank">🎥 Video</a>` : ""}

${w.icerik ? `<a class="btn btn-outline" href="${w.icerik}" target="_blank">📄 İçerik</a>` : ""}

</div>

</div>

`

})

const card=`

<div class="course-card" data-title="${course.title.toLowerCase()}">

<div class="course-header" onclick="toggleAccordion(this)">

${course.title}

<div class="status-icon">+</div>

</div>

<div class="course-content">

<div class="content-body">

${weeksHTML}

</div>

</div>

</div>

`

container.innerHTML+=card

})

}

createCourses()

function toggleAccordion(element){

const card=element.parentElement
const content=element.nextElementSibling
const icon=element.querySelector('.status-icon')

const isOpen=card.classList.contains('active')

document.querySelectorAll('.course-card').forEach(c=>{
c.classList.remove('active')
c.querySelector('.course-content').style.maxHeight=null
c.querySelector('.status-icon').textContent='+'
})

if(!isOpen){

card.classList.add('active')

content.style.maxHeight=content.scrollHeight+"px"

icon.textContent='−'

}

}

function filterCourses(){

const val=document.getElementById('searchInput').value.toLowerCase()

const cards=document.querySelectorAll('.course-card')

cards.forEach(card=>{

const title=card.getAttribute('data-title')

card.style.display=title.includes(val)?"block":"none"

})

}

</script>

</body>
</html>
