function createCourses() {
    const container = document.getElementById("course-container");
    let allCardsHTML = "";

    courses.forEach(course => {
        let weeksHTML = "";
        course.weeks.forEach(w => {
            // DEĞİŞEN KISIM: Video ister tek metin olsun ister liste, burada butonlara dönüşüyor.
            let videoButtons = "";
            if (w.video) {
                const videoList = Array.isArray(w.video) ? w.video : [w.video];
                videoButtons = videoList.map((vid, idx) => 
                    vid ? `<a class="btn btn-outline" href="${vid}" target="_blank">🎥 Video ${videoList.length > 1 ? idx + 1 : ""}</a>` : ""
                ).join("");
            }

            weeksHTML += `
                <div class="week-row">
                    <div class="week-number">${w.week}. HAFTA</div>
                    <div class="button-group">
                        ${w.sunum ? `<a class="btn btn-primary" href="${w.sunum}" target="_blank">📊 Sunum</a>` : ""}
                        ${videoButtons}
                    </div>
                </div>`;
        });

        allCardsHTML += `
            <div class="course-card" data-title="${course.title.toLowerCase()}">
                <div class="course-header" onclick="toggleAccordion(this)">
                    ${course.title}
                    <div class="status-icon">+</div>
                </div>
                <div class="course-content">
                    <div class="content-body">
                        ${weeksHTML}
                    </div>
                </div>
            </div>`;
    });
    container.innerHTML = allCardsHTML;
}

function toggleAccordion(element) {
    const card = element.parentElement;
    const content = element.nextElementSibling;
    const icon = element.querySelector('.status-icon');
    const isOpen = card.classList.contains('active');
    document.querySelectorAll('.course-card').forEach(c => {
        c.classList.remove('active');
        c.querySelector('.course-content').style.maxHeight = null;
        c.querySelector('.status-icon').textContent = '+';
    });
    if (!isOpen) {
        card.classList.add('active');
        content.style.maxHeight = content.scrollHeight + "px";
        icon.textContent = '−';
    }
}

function filterCourses() {
    const val = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.course-card');
    cards.forEach(card => {
        const title = card.getAttribute('data-title');
        card.style.display = title.includes(val) ? "block" : "none";
    });
}
